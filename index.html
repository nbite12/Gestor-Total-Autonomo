    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },

                '500': 'hsl(217, 91%, 60%)',

                '700': 'hsl(217, 91%, 50%)',
                '800': 'hsl(217, 91%, 45%)',

    <!-- jsPDF -->

    <style>
      /* Subtle Gradient Animation */
      @keyframes subtle-gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .animated-gradient-bg {
        background: linear-gradient(-45deg, #A8B2FF, #A1E4FF, #85F4D3, #C0A8FF);
        background-size: 400% 400%;
        animation: subtle-gradient 25s ease infinite;
      }

      html, body, #root {
        height: 100%;
      }

      body {
        overflow-x: hidden;
      }
      
      .celebration-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 1000;
        overflow: hidden;
      }

      /* For simple contribution */
      @keyframes rise {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) rotate(360deg);
          opacity: 0;
        }
      }

      .rising-emoji {
        position: absolute;
        bottom: -50px;
        font-size: 2rem;
        animation: rise 3s linear forwards;
        text-shadow: 0 0 5px rgba(0,0,0,0.5);
      }

      /* === ELEGANT GOAL COMPLETE CELEBRATION (NEW) === */

      .goal-complete-backdrop {
          animation: radial-pulse 5s ease-out forwards;
      }

      @keyframes radial-pulse {
          0% { background: radial-gradient(circle, hsla(38, 96%, 54%, 0.4) 0%, hsla(25, 95%, 53%, 0) 70%); }
          25% { background: radial-gradient(circle, hsla(38, 96%, 54%, 0.6) 0%, hsla(25, 95%, 53%, 0) 70%); }
          50% { background: radial-gradient(circle, hsla(38, 96%, 54%, 0.3) 0%, hsla(25, 95%, 53%, 0) 70%); }
          100% { background: radial-gradient(circle, hsla(38, 96%, 54%, 0) 0%, hsla(25, 95%, 53%, 0) 70%); }
      }
      
      .particle {
          position: absolute;
          top: 50%;
          left: 50%;
          font-size: 1.5rem;
          opacity: 0;
          animation: burst 1.5s ease-out forwards;
      }
      @keyframes burst {
          0% {
              transform: translate(-50%, -50%) scale(0.5);
              opacity: 1;
          }
          100% {
              transform: translate(var(--x), var(--y)) scale(1);
              opacity: 0;
          }
      }

      .trophy-container {
          position: absolute;
          top: 35%;
          left: 50%;
          transform: translate(-50%, -50%);
          animation: trophy-appear 5s ease-out forwards;
          opacity: 0;
      }
      .trophy-icon {
          font-size: clamp(6rem, 20vw, 8rem);
          filter: drop-shadow(0 0 20px hsl(50, 100%, 50%));
      }

      @keyframes trophy-appear {
          0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
          20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
          40% { transform: translate(-50%, -50%) scale(1); }
          80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
          100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
      }
      
      .elegant-message {
          position: absolute;
          top: 55%;
          left: 50%;
          transform: translate(-50%, -50%);
          text-align: center;
          color: white;
          text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
          animation: elegant-message-fade 5s ease-out forwards;
          opacity: 0;
      }

      .elegant-message h1 {
        font-size: clamp(2rem, 10vw, 4rem);
        font-weight: 900;
        color: #ffeb3b;
        margin-bottom: 0.5rem;
        line-height: 1.1;
      }

      .elegant-message p {
        font-size: clamp(1rem, 5vw, 1.5rem);
      }

      @keyframes elegant-message-fade {
          0% { opacity: 0; transform: translate(-50%, -40%); }
          20% { opacity: 1; transform: translate(-50%, -50%); }
          80% { opacity: 1; transform: translate(-50%, -50%); }
          100% { opacity: 0; transform: translate(-50%, -60%); }
      }

      /* AI Listening Glow */
      @keyframes listening-glow {
        0%, 100% { box-shadow: 0 0 8px 0 rgba(0, 122, 255, 0.4); }
        50% { box-shadow: 0 0 16px 3px rgba(0, 122, 255, 0.6); }
      }
      .listening-active {
        animation: listening-glow 2s infinite;
      }
      
      /* === LIQUID GLASS BUTTON STYLES === */
      .glass-button {
        position: relative;
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 9999px; /* fully rounded */
        border: 1px solid rgba(255, 255, 255, 0.2);
        overflow: hidden;
        transition: all 0.3s ease;
      }

      /* Borde brillante superior */
      .glass-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1.5px;
        background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.5), transparent);
        opacity: 0.7;
      }

      /* Reflejo/Luz que sigue al ratón */
      .glass-button::after {
        content: '';
        position: absolute;
        height: 200%;
        width: 200%;
        top: -50%;
        left: -50%;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(255, 255, 255, 0.4) 0%, transparent 40%);
        transform: translate(var(--x, -100%), var(--y, -100%));
        transition: transform 0.2s ease-out;
        opacity: 0;
      }

      .glass-button:hover::after {
        opacity: 1;
      }

      /* Estilo para el botón activo */
      .glass-button.active {
        background-color: rgba(255, 255, 255, 0.2);
      }

      .glass-button.active::after {
          opacity: 1;
          /* Fija el reflejo en el centro para el botón activo */
          --x: 50%;
          --y: 50%;
          background: radial-gradient(circle at center, rgba(0, 122, 255, 0.3) 0%, transparent 50%);
      }
    </style>
